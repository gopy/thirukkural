<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>திருக்குறள் · Thirukkural</title>
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;600;700&family=Inter:wght@300;400;500;600&family=Noto+Serif+Tamil:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --saffron: #C1440E;
    --deep: #1A0A00;
    --cream: #FDF6EC;
    --gold: #D4943A;
    --muted: #8B6F5C;
    --card-bg: #FFFAF4;
    --border: #EAD9C8;
    --tamil-red: #8B1A1A;
  }

  * { box-sizing: border-box; }

  body {
    background: var(--cream);
    color: var(--deep);
    font-family: 'Inter', sans-serif;
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  .site-header {
    background: var(--deep);
    padding: 0;
    position: sticky;
    top: 0;
    z-index: 1000;
    border-bottom: 3px solid var(--saffron);
  }

  .header-inner {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.75rem 1.5rem;
    flex-wrap: wrap;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    text-decoration: none;
    flex-shrink: 0;
  }

  .brand-symbol {
    width: 42px;
    height: 42px;
    background: var(--saffron);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Noto Serif Tamil', serif;
    font-size: 1.1rem;
    color: white;
    font-weight: 700;
    letter-spacing: -1px;
  }

  .brand-text { color: white; }
  .brand-text .title-ta {
    font-family: 'Noto Serif Tamil', serif;
    font-size: 1.15rem;
    font-weight: 700;
    display: block;
    line-height: 1.2;
  }
  .brand-text .title-en {
    font-size: 0.7rem;
    color: var(--gold);
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .header-search {
    flex: 1;
    min-width: 220px;
    max-width: 420px;
    position: relative;
  }

  .header-search input {
    width: 100%;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 8px;
    padding: 0.5rem 0.75rem 0.5rem 2.5rem;
    color: white;
    font-size: 0.9rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .header-search input::placeholder { color: rgba(255,255,255,0.4); }
  .header-search input:focus { border-color: var(--gold); }
  .header-search .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: rgba(255,255,255,0.4);
    font-size: 0.9rem;
  }

  .kural-count-badge {
    background: var(--saffron);
    color: white;
    font-size: 0.75rem;
    padding: 0.25rem 0.75rem;
    border-radius: 20px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }

  /* ─── FILTER BAR ─── */
  .filter-bar {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1.5rem;
    display: flex;
    gap: 0.75rem;
    align-items: center;
    flex-wrap: wrap;
    overflow-x: auto;
  }

  .filter-label {
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.07em;
    white-space: nowrap;
  }

  .filter-select {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.35rem 0.65rem;
    font-size: 0.8rem;
    color: var(--deep);
    background: var(--cream);
    cursor: pointer;
    outline: none;
    transition: border-color 0.15s;
  }
  .filter-select:focus { border-color: var(--saffron); }

  .view-btns .btn {
    padding: 0.3rem 0.55rem;
    font-size: 0.85rem;
    border-color: var(--border);
    color: var(--muted);
  }
  .view-btns .btn.active {
    background: var(--saffron);
    border-color: var(--saffron);
    color: white;
  }

  .clear-btn {
    font-size: 0.78rem;
    color: var(--saffron);
    cursor: pointer;
    border: none;
    background: none;
    padding: 0.3rem 0.5rem;
    white-space: nowrap;
    text-decoration: underline;
  }
  .clear-btn:hover { color: var(--tamil-red); }

  /* ─── RESULTS BAR ─── */
  .results-bar {
    padding: 0.6rem 1.5rem;
    font-size: 0.82rem;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .results-bar strong { color: var(--deep); }

  /* ─── MAIN LAYOUT ─── */
  .main-content {
    padding: 0 1.5rem 2rem;
    max-width: 1400px;
    margin: 0 auto;
  }

  /* ─── KURAL CARDS ─── */
  .kural-grid {
    display: grid;
    gap: 1rem;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
  }
  .kural-grid.list-mode {
    grid-template-columns: 1fr;
  }

  .kural-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    transition: box-shadow 0.2s, transform 0.15s;
    cursor: pointer;
    position: relative;
  }
  .kural-card:hover {
    box-shadow: 0 6px 20px rgba(193,68,14,0.12);
    transform: translateY(-2px);
  }

  .kural-number-strip {
    background: var(--saffron);
    color: white;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    padding: 0.3rem 1rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .kural-number-strip .num { font-size: 1rem; }

  .chapter-tag {
    background: rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 0.1rem 0.5rem;
    font-size: 0.65rem;
    letter-spacing: 0.05em;
    max-width: 180px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .kural-body { padding: 1rem; }

  .kural-lines {
    font-family: 'Noto Serif Tamil', serif;
    font-size: 1.02rem;
    line-height: 1.7;
    color: var(--tamil-red);
    margin-bottom: 0.75rem;
    font-weight: 700;
  }
  .kural-lines .line { display: block; }

  .kural-translation {
    font-family: 'Lora', serif;
    font-size: 0.88rem;
    color: var(--deep);
    line-height: 1.55;
    margin-bottom: 0.75rem;
    font-style: italic;
  }

  .kural-explanation {
    font-size: 0.8rem;
    color: var(--muted);
    line-height: 1.5;
    display: none;
  }
  .kural-card.expanded .kural-explanation { display: block; }

  .mv-text {
    font-size: 0.8rem;
    color: #5a4535;
    line-height: 1.55;
    margin-top: 0.5rem;
    padding-top: 0.5rem;
    border-top: 1px dashed var(--border);
    font-family: 'Noto Serif Tamil', serif;
    display: none;
  }
  .kural-card.expanded .mv-text { display: block; }

  .kural-footer {
    padding: 0.5rem 1rem;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 0.75rem;
    color: var(--muted);
  }

  .expand-btn {
    border: none;
    background: none;
    color: var(--saffron);
    font-size: 0.75rem;
    cursor: pointer;
    padding: 0;
    font-weight: 600;
  }
  .expand-btn:hover { text-decoration: underline; }

  .copy-btn {
    border: none;
    background: none;
    color: var(--muted);
    cursor: pointer;
    padding: 0 0.25rem;
    font-size: 0.9rem;
  }
  .copy-btn:hover { color: var(--saffron); }

  /* ─── LIST MODE ─── */
  .kural-grid.list-mode .kural-card { border-radius: 8px; }
  .kural-grid.list-mode .kural-body {
    display: flex;
    gap: 1rem;
    align-items: flex-start;
    flex-wrap: wrap;
  }
  .kural-grid.list-mode .kural-lines { min-width: 200px; flex: 1; margin-bottom: 0; }
  .kural-grid.list-mode .kural-translation { flex: 2; margin-bottom: 0; min-width: 200px; }
  .kural-grid.list-mode .kural-explanation { flex: 1; min-width: 200px; }

  /* ─── PAGINATION ─── */
  .pagination-bar {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    padding: 1.5rem 0;
    flex-wrap: wrap;
  }

  .pg-btn {
    width: 36px;
    height: 36px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: white;
    color: var(--deep);
    font-size: 0.85rem;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    font-weight: 500;
  }
  .pg-btn:hover:not(:disabled) { border-color: var(--saffron); color: var(--saffron); }
  .pg-btn.active { background: var(--saffron); border-color: var(--saffron); color: white; font-weight: 700; }
  .pg-btn:disabled { opacity: 0.35; cursor: not-allowed; }
  .pg-btn.wide { width: auto; padding: 0 0.75rem; }

  .per-page-select {
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 0.3rem 0.5rem;
    font-size: 0.8rem;
    color: var(--deep);
    background: white;
    cursor: pointer;
    outline: none;
  }

  /* ─── EMPTY STATE ─── */
  .empty-state {
    text-align: center;
    padding: 4rem 1rem;
    color: var(--muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
  .empty-state h4 { color: var(--deep); margin-bottom: 0.5rem; }

  /* ─── HIGHLIGHT ─── */
  mark { background: rgba(212,148,58,0.25); color: inherit; padding: 0 2px; border-radius: 2px; }

  /* ─── LOADING ─── */
  .loading-overlay {
    text-align: center;
    padding: 5rem 1rem;
    color: var(--muted);
  }
  .spinner-saffron { color: var(--saffron); }

  /* ─── TOAST ─── */
  .copy-toast {
    position: fixed;
    bottom: 1.5rem;
    right: 1.5rem;
    background: var(--deep);
    color: white;
    padding: 0.6rem 1.2rem;
    border-radius: 8px;
    font-size: 0.85rem;
    z-index: 9999;
    opacity: 0;
    transition: opacity 0.3s;
    pointer-events: none;
  }
  .copy-toast.show { opacity: 1; }

  /* ─── RESPONSIVE ─── */
  @media (max-width: 600px) {
    .header-inner { padding: 0.6rem 1rem; }
    .filter-bar { padding: 0.5rem 1rem; }
    .main-content { padding: 0 0.75rem 2rem; }
    .kural-grid { grid-template-columns: 1fr; }
    .results-bar { padding: 0.5rem 1rem; }
  }

  /* ─── DECORATIVE ─── */
  .section-divider {
    display: flex;
    align-items: center;
    gap: 0.75rem;
    padding: 0.75rem 0;
    font-size: 0.75rem;
    font-weight: 600;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .section-divider::before, .section-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .pg-info {
    font-size: 0.8rem;
    color: var(--muted);
    margin: 0 0.5rem;
  }
</style>
</head>
<body>

<!-- HEADER -->
<header class="site-header">
  <div class="header-inner">
    <a class="brand" href="#">
      <div class="brand-symbol">குற</div>
      <div class="brand-text">
        <span class="title-ta">திருக்குறள்</span>
        <span class="title-en">Thirukkural · 1330 Couplets</span>
      </div>
    </a>
    <div class="header-search">
      <i class="bi bi-search search-icon"></i>
      <input type="search" id="searchInput" placeholder="Search in Tamil or English…" autocomplete="off">
    </div>
    <div class="kural-count-badge" id="totalBadge">Loading…</div>
  </div>
</header>

<!-- FILTER BAR -->
<div class="filter-bar">
  <span class="filter-label"><i class="bi bi-funnel me-1"></i>Filter</span>

  <select class="filter-select" id="sectionFilter">
    <option value="">All Sections (பால்)</option>
  </select>

  <select class="filter-select" id="chapterGroupFilter">
    <option value="">All Chapter Groups (இயல்)</option>
  </select>

  <select class="filter-select" id="chapterFilter">
    <option value="">All Chapters (அதிகாரம்)</option>
  </select>

  <div class="ms-auto d-flex gap-2 align-items-center">
    <button class="clear-btn" id="clearBtn">✕ Clear</button>
    <div class="view-btns btn-group" role="group">
      <button class="btn btn-sm active" id="gridViewBtn" title="Grid view"><i class="bi bi-grid-3x3-gap"></i></button>
      <button class="btn btn-sm" id="listViewBtn" title="List view"><i class="bi bi-list-ul"></i></button>
    </div>
  </div>
</div>

<!-- RESULTS BAR -->
<div class="results-bar" id="resultsBar">
  <span id="resultsCount"></span>
  <span class="ms-auto d-flex align-items-center gap-2">
    <span class="filter-label">Show</span>
    <select class="per-page-select" id="perPageSelect">
      <option value="12">12</option>
      <option value="24" selected>24</option>
      <option value="50">50</option>
      <option value="100">100</option>
    </select>
    <span class="filter-label">per page</span>
  </span>
</div>

<!-- MAIN -->
<div class="main-content">
  <div id="loadingState" class="loading-overlay">
    <div class="spinner-border spinner-saffron mb-3" role="status"></div>
    <div>Loading திருக்குறள்…</div>
  </div>

  <div id="kuralContainer" class="kural-grid" style="display:none"></div>

  <div id="emptyState" class="empty-state" style="display:none">
    <div class="icon"><i class="bi bi-search"></i></div>
    <h4>No Kurals found</h4>
    <p>Try a different search or clear filters.</p>
    <button class="btn btn-sm btn-outline-secondary" onclick="document.getElementById('clearBtn').click()">Clear Filters</button>
  </div>

  <div id="paginationBar" class="pagination-bar" style="display:none"></div>
</div>

<div class="copy-toast" id="copyToast">Copied!</div>

<script>
// ─── DATA ───────────────────────────────────────────────────────
const KURAL_URL   = 'https://raw.githubusercontent.com/gopy/thirukkural/refs/heads/main/thirukkural.json';
const DETAIL_URL  = 'https://raw.githubusercontent.com/gopy/thirukkural/refs/heads/main/detail.json';

let allKurals = [];
let detailData = null;
let chapterMap = {}; // number → {name, translation, group, section}

// Pagination / filter state
let currentPage = 1;
let perPage = 24;
let filteredKurals = [];
let viewMode = 'grid'; // 'grid' | 'list'
let expandedCards = new Set();

// ─── FETCH ───────────────────────────────────────────────────────
async function loadData() {
  const [kuralRes, detailRes] = await Promise.all([
    fetch(KURAL_URL),
    fetch(DETAIL_URL)
  ]);
  const kuralJson  = await kuralRes.json();
  const detailJson = await detailRes.json();

  allKurals = kuralJson.kural;
  detailData = detailJson;
  buildChapterMap();
  populateFilters();
  document.getElementById('totalBadge').textContent = `${allKurals.length} Kurals`;
  applyFilters();
  document.getElementById('loadingState').style.display = 'none';
}

// ─── CHAPTER MAP ─────────────────────────────────────────────────
function buildChapterMap() {
  if (!detailData) return;
  detailData.forEach(root => {
    (root.section?.detail || []).forEach(section => {
      (section.chapterGroup?.detail || []).forEach(group => {
        (group.chapters?.detail || []).forEach(ch => {
          chapterMap[ch.number] = {
            name: ch.name,
            translation: ch.translation,
            transliteration: ch.transliteration,
            start: ch.start,
            end: ch.end,
            groupName: group.name,
            groupTranslation: group.translation,
            sectionName: section.name,
            sectionTranslation: section.translation,
          };
        });
      });
    });
  });
}

function getChapterForKural(num) {
  for (const ch of Object.values(chapterMap)) {
    if (num >= ch.start && num <= ch.end) return ch;
  }
  return null;
}

function getChapterNumber(kuralNum) {
  return Math.ceil(kuralNum / 10);
}

// ─── FILTER DROPDOWNS ────────────────────────────────────────────
function populateFilters() {
  if (!detailData) return;
  const sectionSel = document.getElementById('sectionFilter');
  const groupSel   = document.getElementById('chapterGroupFilter');
  const chapterSel = document.getElementById('chapterFilter');

  const sections = [];
  const groups   = [];
  const chapters = [];

  detailData.forEach(root => {
    (root.section?.detail || []).forEach(section => {
      sections.push({ name: section.name, translation: section.translation });
      (section.chapterGroup?.detail || []).forEach(group => {
        groups.push({ name: group.name, translation: group.translation, section: section.name });
        (group.chapters?.detail || []).forEach(ch => {
          chapters.push({ number: ch.number, name: ch.name, translation: ch.translation, group: group.name });
        });
      });
    });
  });

  sections.forEach(s => {
    const o = new Option(`${s.name} — ${s.translation}`, s.name);
    sectionSel.add(o);
  });

  const allGroups = groups;
  function refreshGroupFilter(sectionName) {
    const current = groupSel.value;
    groupSel.innerHTML = '<option value="">All Chapter Groups (இயல்)</option>';
    allGroups
      .filter(g => !sectionName || g.section === sectionName)
      .forEach(g => {
        const o = new Option(`${g.name} — ${g.translation}`, g.name);
        groupSel.add(o);
      });
    if ([...groupSel.options].some(o => o.value === current)) groupSel.value = current;
  }

  function refreshChapterFilter(groupName, sectionName) {
    const current = chapterSel.value;
    chapterSel.innerHTML = '<option value="">All Chapters (அதிகாரம்)</option>';
    chapters
      .filter(c => {
        const ch = chapterMap[c.number];
        if (groupName && ch.groupName !== groupName) return false;
        if (sectionName && ch.sectionName !== sectionName) return false;
        return true;
      })
      .forEach(c => {
        const o = new Option(`${c.number}. ${c.name} — ${c.translation}`, String(c.number));
        chapterSel.add(o);
      });
    if ([...chapterSel.options].some(o => o.value === current)) chapterSel.value = current;
  }

  refreshGroupFilter('');
  refreshChapterFilter('', '');

  sectionSel.addEventListener('change', () => {
    refreshGroupFilter(sectionSel.value);
    refreshChapterFilter(groupSel.value, sectionSel.value);
    reset();
  });
  groupSel.addEventListener('change', () => {
    refreshChapterFilter(groupSel.value, sectionSel.value);
    reset();
  });
  chapterSel.addEventListener('change', reset);
}

// ─── FILTER / SEARCH ─────────────────────────────────────────────
function applyFilters() {
  const query      = document.getElementById('searchInput').value.trim().toLowerCase();
  const sectionVal = document.getElementById('sectionFilter').value;
  const groupVal   = document.getElementById('chapterGroupFilter').value;
  const chapterVal = document.getElementById('chapterFilter').value;

  filteredKurals = allKurals.filter(k => {
    const ch = getChapterForKural(k.Number);

    if (sectionVal && ch?.sectionName !== sectionVal) return false;
    if (groupVal   && ch?.groupName   !== groupVal)   return false;
    if (chapterVal && ch?.start && !(k.Number >= ch.start && k.Number <= ch.end && String(getChapterNumber(k.Number)) === chapterVal)) {
      // re-check: chapterVal is chapter number
      const selectedCh = chapterMap[parseInt(chapterVal)];
      if (!selectedCh || k.Number < selectedCh.start || k.Number > selectedCh.end) return false;
    }

    if (query) {
      const hay = [
        k.Line1, k.Line2, k.Translation, k.mv, k.sp, k.mk, k.explanation, k.couplet,
        k.transliteration1, k.transliteration2
      ].join(' ').toLowerCase();
      return hay.includes(query);
    }
    return true;
  });

  currentPage = 1;
  render();
}

function reset() { applyFilters(); }

// ─── RENDER ──────────────────────────────────────────────────────
function render() {
  const container  = document.getElementById('kuralContainer');
  const empty      = document.getElementById('emptyState');
  const pgBar      = document.getElementById('paginationBar');
  const resultsDiv = document.getElementById('resultsBar');

  if (filteredKurals.length === 0) {
    container.style.display = 'none';
    empty.style.display = 'block';
    pgBar.style.display = 'none';
    document.getElementById('resultsCount').textContent = '0 kurals found';
    return;
  }

  empty.style.display = 'none';
  container.style.display = viewMode === 'list' ? 'grid' : 'grid';
  container.className = 'kural-grid' + (viewMode === 'list' ? ' list-mode' : '');

  const total = filteredKurals.length;
  const pages = Math.ceil(total / perPage);
  if (currentPage > pages) currentPage = pages;

  const start = (currentPage - 1) * perPage;
  const end   = Math.min(start + perPage, total);
  const slice = filteredKurals.slice(start, end);

  const query = document.getElementById('searchInput').value.trim();

  document.getElementById('resultsCount').innerHTML =
    `Showing <strong>${start+1}–${end}</strong> of <strong>${total}</strong> kurals`;

  container.innerHTML = slice.map(k => kuralCard(k, query)).join('');
  renderPagination(pages);
  pgBar.style.display = pages > 1 ? 'flex' : 'none';

  // restore expanded
  container.querySelectorAll('.kural-card').forEach(card => {
    const num = parseInt(card.dataset.num);
    if (expandedCards.has(num)) card.classList.add('expanded');
  });
}

function highlight(text, query) {
  if (!query || !text) return text || '';
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(`(${escaped})`, 'gi'), '<mark>$1</mark>');
}

function kuralCard(k, query) {
  const ch = getChapterForKural(k.Number);
  const chName = ch ? ch.name : '';
  const chEn   = ch ? ch.translation : '';

  const hl = s => highlight(s, query);

  return `<div class="kural-card" data-num="${k.Number}" onclick="toggleExpand(this)">
    <div class="kural-number-strip">
      <span><span class="num">${k.Number}</span></span>
      <span class="chapter-tag" title="${chEn}">${chName}</span>
    </div>
    <div class="kural-body">
      <div class="kural-lines">
        <span class="line">${hl(k.Line1)}</span>
        <span class="line">${hl(k.Line2)}</span>
      </div>
      <div class="kural-translation">${hl(k.Translation || '')}</div>
      <div class="kural-explanation">${hl(k.explanation || '')}</div>
      ${k.mv ? `<div class="mv-text">${hl(k.mv)}</div>` : ''}
    </div>
    <div class="kural-footer">
      <span>${ch ? `<small>${ch.groupName || ''} · ${ch.sectionTranslation || ''}</small>` : ''}</span>
      <span class="d-flex align-items-center gap-2">
        <button class="expand-btn" onclick="event.stopPropagation();toggleExpand(this.closest('.kural-card'))">
          <i class="bi bi-chevron-down"></i> Details
        </button>
        <button class="copy-btn" title="Copy" onclick="event.stopPropagation();copyKural(${k.Number})">
          <i class="bi bi-clipboard"></i>
        </button>
      </span>
    </div>
  </div>`;
}

function toggleExpand(card) {
  card.classList.toggle('expanded');
  const num = parseInt(card.dataset.num);
  if (card.classList.contains('expanded')) {
    expandedCards.add(num);
    card.querySelector('.expand-btn').innerHTML = '<i class="bi bi-chevron-up"></i> Less';
  } else {
    expandedCards.delete(num);
    card.querySelector('.expand-btn').innerHTML = '<i class="bi bi-chevron-down"></i> Details';
  }
}

function copyKural(num) {
  const k = allKurals.find(x => x.Number === num);
  if (!k) return;
  const text = `${k.Number}. ${k.Line1}\n${k.Line2}\n\n${k.Translation}`;
  navigator.clipboard.writeText(text).then(() => showToast('Copied!')).catch(() => {});
}

function showToast(msg) {
  const t = document.getElementById('copyToast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 1800);
}

// ─── PAGINATION ───────────────────────────────────────────────────
function renderPagination(pages) {
  const bar = document.getElementById('paginationBar');
  if (pages <= 1) { bar.innerHTML = ''; return; }

  const maxBtns = 7;
  let html = '';

  html += `<button class="pg-btn" onclick="goPage(${currentPage-1})" ${currentPage===1?'disabled':''}><i class="bi bi-chevron-left"></i></button>`;

  if (pages <= maxBtns) {
    for (let i = 1; i <= pages; i++) {
      html += `<button class="pg-btn${i===currentPage?' active':''}" onclick="goPage(${i})">${i}</button>`;
    }
  } else {
    const show = new Set();
    show.add(1); show.add(pages);
    for (let i = Math.max(1, currentPage-2); i <= Math.min(pages, currentPage+2); i++) show.add(i);

    let prev = 0;
    [...show].sort((a,b)=>a-b).forEach(p => {
      if (prev && p - prev > 1) html += `<span class="pg-info">…</span>`;
      html += `<button class="pg-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</button>`;
      prev = p;
    });
  }

  html += `<button class="pg-btn" onclick="goPage(${currentPage+1})" ${currentPage===pages?'disabled':''}><i class="bi bi-chevron-right"></i></button>`;
  html += `<span class="pg-info">Page ${currentPage} / ${pages}</span>`;

  bar.innerHTML = html;
}

function goPage(p) {
  const pages = Math.ceil(filteredKurals.length / perPage);
  if (p < 1 || p > pages) return;
  currentPage = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ─── EVENTS ──────────────────────────────────────────────────────
let searchTimer;
document.getElementById('searchInput').addEventListener('input', () => {
  clearTimeout(searchTimer);
  searchTimer = setTimeout(() => { currentPage = 1; applyFilters(); }, 250);
});

document.getElementById('perPageSelect').addEventListener('change', e => {
  perPage = parseInt(e.target.value);
  currentPage = 1;
  render();
});

document.getElementById('clearBtn').addEventListener('click', () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('sectionFilter').value = '';
  document.getElementById('chapterGroupFilter').value = '';
  document.getElementById('chapterFilter').value = '';
  // rebuild dropdowns
  populateFilters();
  applyFilters();
});

document.getElementById('gridViewBtn').addEventListener('click', () => {
  viewMode = 'grid';
  document.getElementById('gridViewBtn').classList.add('active');
  document.getElementById('listViewBtn').classList.remove('active');
  render();
});

document.getElementById('listViewBtn').addEventListener('click', () => {
  viewMode = 'list';
  document.getElementById('listViewBtn').classList.add('active');
  document.getElementById('gridViewBtn').classList.remove('active');
  render();
});

// ─── INIT ────────────────────────────────────────────────────────
loadData().catch(err => {
  document.getElementById('loadingState').innerHTML =
    `<div class="text-danger"><i class="bi bi-exclamation-triangle fs-2"></i><p class="mt-2">Failed to load data.<br>${err.message}</p></div>`;
});
</script>
